# Dazbeez reserved host port: 4488
# Internal container port: 3000
# Do not change host port — reserved to avoid conflicts with other local services.

services:
  # Next.js application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4488:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dazbeez-network

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs
    restart: unless-stopped
    networks:
      - dazbeez-network
    profiles:
      - production

  # Cloudflare Tunnel service
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required for the production profile}
    restart: unless-stopped
    depends_on:
      - nginx
    networks:
      - dazbeez-network
    profiles:
      - production

  # Ollama LLM service (for future use)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - dazbeez-network
    profiles:
      - llm

networks:
  dazbeez-network:
    driver: bridge

volumes:
  ollama-data:
