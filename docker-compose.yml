# Production runs on Cloudflare Workers via OpenNext.
# This compose file is kept only for local/reference container workflows.
# Dazbeez reserved host port: 4488
# Internal container port: 3000
# Do not change host port — reserved to avoid conflicts with other local services.

services:
  # Local reference Next.js container
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4488:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PAGE_USERNAME=${ADMIN_PAGE_USERNAME}
      - ADMIN_PAGE_PASSWORD=${ADMIN_PAGE_PASSWORD}
      - NFC_ADMIN_API_URL=${NFC_ADMIN_API_URL}
      - NFC_ADMIN_API_KEY=${NFC_ADMIN_API_KEY}
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dazbeez-network

  # Optional local reverse proxy reference
  nginx:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs
    restart: unless-stopped
    networks:
      - dazbeez-network
    profiles:
      - proxy

  # Optional local Ollama sidecar
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - dazbeez-network
    profiles:
      - llm

networks:
  dazbeez-network:
    driver: bridge

volumes:
  ollama-data:
